function langLinks(l){document.querySelectorAll('a[href$=".html"]').forEach(function(a){var b=a.getAttribute('href').split('?')[0];a.setAttribute('href',b+'?lang='+l);});}
function setLang(l){var d=D[l];document.documentElement.lang=l;
document.querySelectorAll('[data-i18n]').forEach(function(e){var k=e.getAttribute('data-i18n');if(d[k]!==undefined)e.textContent=d[k];});
